# Tokyo Night theme for Atuin
# Based on the Tokyo Night color scheme
# https://github.com/folke/tokyonight.nvim

# Main colors
AlertInfo = "lightskyblue" # #7aa2f7 - info blue
AlertWarn = "goldenrod"    # #e0af68 - warning yellow
AlertError = "lightcoral"  # #f7768e - error red
Annotation = "slategray"   # #565f89 - comment gray
Base = "white"             # high-contrast base text
Guidance = "mediumpurple"  # #bb9af7 - purple accent
Important = "cyan"         # #7dcfff - bright cyan
