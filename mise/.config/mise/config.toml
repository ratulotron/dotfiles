# Mise Configuration - Language Runtimes & Ecosystem Tools
#
# Philosophy:
#   - Runtimes & Package Managers: Managed by mise (per-project versions)
#   - CLI Tools: Managed by Homebrew (system-wide)
#   - Language-specific dev tools: Via language package managers (uv, npm, etc.)
#
# Usage:
#   mise install              # Install all tools below
#   mise install node python  # Install specific tools
#   mise upgrade              # Upgrade all tools
#   mise ls                   # List installed tools

[settings]
experimental = true
legacy_version_file = true

[tools]
# === JavaScript/TypeScript ===
node = "lts"    # Core runtime for static site
pnpm = "latest" # Fast package manager

# === Python ===
python = "latest"        # Python runtime
uv = "latest"
ruff = "latest"
"npm:pyright" = "latest"

# === Golang ===
go = "1.25"
"go:golang.org/x/tools/gopls" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"

# === DevOps ===
# terraform = "latest"

# === AI/ML ===
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@github/copilot" = "latest"
# ollama = "latest"

[env]
# Python environment settings
PIP_REQUIRE_VIRTUALENV = "true"

# Node.js memory limit
NODE_OPTIONS = "--max-old-space-size=8192"
