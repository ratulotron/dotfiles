# Mise Configuration - Language Runtimes & Ecosystem Tools
#
# Philosophy:
#   - Runtimes & Package Managers: Managed by mise (per-project versions)
#   - CLI Tools: Managed by Homebrew (system-wide)
#   - Language-specific dev tools: Via language package managers (uv, npm, etc.)
#
# Usage:
#   mise install              # Install all tools below
#   mise install node python  # Install specific tools
#   mise upgrade              # Upgrade all tools
#   mise ls                   # List installed tools

[settings]
experimental = true
legacy_version_file = true

[tools]
# === JavaScript/TypeScript ===
node = "lts"    # Core runtime for static site
pnpm = "latest" # Fast package manager

# === Python ===
python = "3.13" # Python runtime
uv = "latest"   # Fast pip/venv replacement & tool installer

# === DevOps ===
terraform = "latest"

# === AI/ML ===
ollama = "latest"

# === Commented Out (uncomment when needed) ===
# JavaScript alternatives
# bun = "latest"           # Alternative JS runtime
# yarn = "latest"          # Alternative package manager  
# deno = "latest"          # Alternative JS/TS runtime

# Other languages
# go = "1.24"              # Go language
# rust = "latest"          # Rust language + cargo
# cargo-binstall = "latest" # Fast binary installer for Rust
# elixir = "latest"        # Elixir language
# rebar = "latest"         # Elixir build tool
# erlang = "27"            # Erlang VM (requires libncurses-dev, libicu-dev)
# gleam = "latest"         # Gleam language

[env]
# Python environment settings
PIP_REQUIRE_VIRTUALENV = "true"

# Node.js memory limit
NODE_OPTIONS = "--max-old-space-size=8192"
