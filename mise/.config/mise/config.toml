# Mise Configuration - Language Runtimes & Ecosystem Tools
#
# CLI utilities (bat, fd, ripgrep, etc.) are managed by Homebrew.
# Mise focuses on language runtimes where version-per-project matters.
#
# Usage:
#   mise install              # Install all tools below
#   mise install node python  # Install specific tools
#   mise upgrade              # Upgrade all tools
#   mise ls                   # List installed tools

[settings]
experimental = true
legacy_version_file = true

[tools]
# === JavaScript/TypeScript ===
node = "lts"
bun = "latest"
pnpm = "latest"
yarn = "latest"
deno = "latest"

# === Python ===
python = "3.13"
uv = "latest"   # Fast pip replacement
ruff = "latest" # Fast linter/formatter

# === Go ===
go = "1.24"

# === Rust ===
rust = "latest"
cargo-binstall = "latest"

# === Elixir/Erlang ===
elixir = "latest"
rebar = "latest"
# erlang = "27"     # Uncomment if needed; requires libncurses-dev, libicu-dev

# === Gleam ===
gleam = "latest"

# === DevOps ===
terraform = "latest"

# === AI/ML ===
ollama = "latest"

[env]
EDITOR = "hx"
PIP_REQUIRE_VIRTUALENV = "true"
GOPROXY = "https://proxy.golang.org,direct"
NODE_OPTIONS = "--max-old-space-size=8192"
