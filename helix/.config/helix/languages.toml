####################
# Language Servers #
####################

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]
config.hostInfo = "helix"

[language-server.vscode-eslint-language-server]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.emmet-ls]
command = "emmet-ls"
args = ["--stdio"]

[language-server.clangd]
command = "clangd"
config = { clangd.fallbackFlags = ["-std=gnu11"] }
args = []

# Python: Pyright for intellisense + Ruff for linting/formatting
[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.ruff]
command = "ruff"
args = ["server"]

# Go
[language-server.gopls]
command = "gopls"
[language-server.gopls.config]
gofumpt = true
local = "goimports"
semanticTokens = true
staticcheck = true
analyses = { "fieldalignment" = true, "nilness" = true, unusedparams = true, unusedwrite = true, useany = true }
usePlaceholders = true
completeUnimported = true
hints = { "assignVariableType" = true, "compositeLiteralFields" = true, "compositeLiteralTypes" = true, "constantValues" = true, "functionTypeParameters" = true, "parameterNames" = true, "rangeVariableTypes" = true }

# Elixir
[language-server.elixir-ls]
command = "elixir-ls"
config = { elixirLS.dialyzerEnabled = true }

# TOML
[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

# YAML
[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

# Markdown
[language-server.marksman]
command = "marksman"
args = ["server"]


####################
# System Languages #
####################

# C
[[language]]
name = "c"
auto-format = false
language-servers = ["clangd"]

[[language]]
name = "rust"
language-servers = ["rust-analyzer"]
scope = "source.rust"
injection-regex = "rust"
file-types = ["rs"]
# comment-token = "//"
indent = { tab-width = 4, unit = "	" }
auto-format = true


#####################
# Backend Languages #
#####################

# Python - Pyright for completions/navigation, Ruff for diagnostics/formatting
[[language]]
name = "python"
auto-format = true
language-servers = ["pyright", "ruff"]
indent = { tab-width = 4, unit = "    " }
roots = ["pyproject.toml", "setup.py", "requirements.txt", ".git"]

# JavaScript/TypeScript

[[language]]
name = "typescript"
auto-format = true
language-servers = [
    "typescript-language-server",
    "vscode-eslint-language-server",
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "javascript"
auto-format = true
language-servers = [
    "typescript-language-server",
    "vscode-eslint-language-server",
]
formatter = { command = "prettier", args = ["--parser", "babel"] }
indent = { tab-width = 2, unit = "  " }


##############
# Web Design #
##############

[[language]]
name = "html"
formatter = { command = 'prettier', args = ["--parser", "html"] }

[[language]]
name = "json"
formatter = { command = 'prettier', args = ["--parser", "json"] }

[[language]]
name = "css"
formatter = { command = 'prettier', args = ["--parser", "css"] }

[[language]]
name = "tsx"
auto-format = true
language-servers = [
    "typescript-language-server",
    "vscode-eslint-language-server",
    "emmet-ls",
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "jsx"
auto-format = true
language-servers = [
    "typescript-language-server",
    "vscode-eslint-language-server",
    "emmet-ls",
]
formatter = { command = "prettier", args = ["--parser", "babel"] }
indent = { tab-width = 2, unit = "  " }


########
# Misc #
########

[[language]]
name = "toml"
auto-format = true
language-servers = ["taplo"]

[[language]]
name = "yaml"
auto-format = true
language-servers = ["yaml-language-server"]
formatter = { command = "prettier", args = ["--parser", "yaml"] }

[[language]]
name = "markdown"
auto-format = true
language-servers = ["marksman"]
formatter = { command = "prettier", args = ["--parser", "markdown"] }
soft-wrap.enable = true

[[language]]
name = "hcl"
auto-format = true
formatter = { command = "terraform", args = ["fmt", "-"] }

[[language]]
name = "tfvars"
auto-format = true
formatter = { command = "terraform", args = ["fmt", "-"] }

# Go
[[language]]
name = "go"
auto-format = true
roots = ["go.work", "go.mod"]
language-servers = ["gopls"]
formatter = { command = "goimports" }

[language.debugger]
name = "go"
transport = "tcp"
command = "dlv"
args = ["dap"]
port-arg = "-l 127.0.0.1:{}"

[[language.debugger.templates]]
name = "source"
request = "launch"
completion = [{ name = "entrypoint", completion = "filename", default = "." }]
args = { mode = "debug", program = "{0}" }

[[language.debugger.templates]]
name = "test"
request = "launch"
completion = [{ name = "tests", completion = "directory", default = "." }]
args = { mode = "test", program = "{0}" }

[[language.debugger.templates]]
name = "attach"
request = "attach"
completion = ["pid"]
args = { mode = "local", processId = "{0}" }

[[language]]
name = "gomod"
auto-format = true
file-types = [{ glob = "go.mod" }]
language-servers = ["gopls"]
indent = { tab-width = 4, unit = "\t" }

[[language]]
name = "gowork"
auto-format = true
file-types = [{ glob = "go.work" }]
language-servers = ["gopls"]
indent = { tab-width = 4, unit = "\t" }

[[language]]
name = "gotmpl"
file-types = ["gotmpl"]
language-servers = ["gopls"]
indent = { tab-width = 2, unit = "  " }

# Elixir
[[language]]
name = "elixir"
auto-format = true
language-servers = ["elixir-ls"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "heex"
auto-format = true
language-servers = ["elixir-ls"]
indent = { tab-width = 2, unit = "  " }
