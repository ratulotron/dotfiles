# Broot Configuration
# Interactive directory tree with fuzzy search

###############################################################
# Default flags
# You can set up flags you want broot to start with here
###############################################################
default_flags = "ghp"
# g: show git status
# h: show hidden files
# p: show permissions

###############################################################
# Modal mode (vim-like)
###############################################################
modal = false

###############################################################
# Columns
###############################################################
# The list of columns, in order, to display
cols_order = [
    "mark",
    "git",
    "permission",
    "size",
    "date",
    "count",
    "branch",
    "name",
]

###############################################################
# Date/time format
###############################################################
date_time_format = "%Y-%m-%d %H:%M"

###############################################################
# Show selection mark
###############################################################
show_selection_mark = true

###############################################################
# Icon theme
###############################################################
icon_theme = "nerdfont"

###############################################################
# Syntax theme for file previews
###############################################################
syntax_theme = "base16-ocean.dark"

###############################################################
# True colors (24-bit)
###############################################################
true_colors = true

###############################################################
# Import Tokyo Night skin
###############################################################
imports = ["skins/tokyo-night.toml"]

###############################################################
# Verbs (custom commands)
###############################################################
[[verbs]]
invocation = "edit"
shortcut = "e"
execution = "$EDITOR {file}"
leave_broot = false

[[verbs]]
invocation = "terminal"
shortcut = "t"
execution = "$SHELL"
set_working_dir = true
leave_broot = false

[[verbs]]
key = "ctrl-c"
external = "echo {file} | pbcopy"
leave_broot = false

[[verbs]]
invocation = "create {subpath}"
execution = "$EDITOR {directory}/{subpath}"
leave_broot = false

[[verbs]]
invocation = "git_diff"
shortcut = "gd"
leave_broot = false
execution = "git diff {file}"

[[verbs]]
invocation = "git_log"
shortcut = "gl"
leave_broot = false
execution = "git log --oneline {file}"

[[verbs]]
key = "ctrl-h"
internal = ":toggle_hidden"

[[verbs]]
key = "ctrl-g"
internal = ":toggle_git_ignore"

[[verbs]]
key = "enter"
internal = ":open_stay"
apply_to = "file"

[[verbs]]
key = "enter"
internal = ":focus"
apply_to = "directory"

[[verbs]]
invocation = "zellij_pane"
shortcut = "zp"
execution = "zellij run -- $EDITOR {file}"
leave_broot = true
